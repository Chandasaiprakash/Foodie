name: CI — Build, Test & Push

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com

jobs:
  build-and-test:
    name: Build & Test — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - order-service
          - payment-service
          - inventory-service
          - delivery-service
          - auth-service
          - notification-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: mvn test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.service }}
          path: services/${{ matrix.service }}/target/surefire-reports/

  build-and-push:
    name: Docker Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service:
          - order-service
          - payment-service
          - inventory-service
          - delivery-service
          - auth-service
          - notification-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        working-directory: services/${{ matrix.service }}
        run: mvn package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        working-directory: services/${{ matrix.service }}
        env:
          IMAGE_TAG: ${{ github.sha }}
          SERVICE: ${{ matrix.service }}
        run: |
          docker build -t $ECR_REGISTRY/foodie-$SERVICE:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/foodie-$SERVICE:latest .
          docker push $ECR_REGISTRY/foodie-$SERVICE:$IMAGE_TAG
          docker push $ECR_REGISTRY/foodie-$SERVICE:latest
          echo "image=$ECR_REGISTRY/foodie-$SERVICE:$IMAGE_TAG" >> $GITHUB_OUTPUT