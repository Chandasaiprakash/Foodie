server.port=8082

spring.application.name=order-service

spring.datasource.url=jdbc:mysql://localhost:3306/foodie_order?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.kafka.bootstrap-servers=localhost:9092

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true


# Producer Configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# Consumer Configuration
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.foodie.common.events

# Expose the Prometheus and health endpoints over HTTP
management.endpoints.web.exposure.include=prometheus,health

# Add an 'application' tag to all metrics for this service
management.metrics.tags.application=${spring.application.name}

# This tells Spring Kafka to add a '__TypeId__' header to each message
spring.kafka.producer.properties.spring.json.add.type.headers=true


# ===================================================================
# ? ADVANCED LOGGING CONFIGURATION (for Development)
# ===================================================================

# --- Base Log Level ---
logging.level.root=INFO

# --- Spring Framework ---
logging.level.org.springframework=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# --- Database & Data (JPA/Hibernate) ---
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# --- Service Discovery (Eureka) ---
logging.level.com.netflix.discovery=INFO
logging.level.com.netflix.eureka=INFO

# --- Message Queue (Kafka) ---
logging.level.org.apache.kafka=WARN

# --- Monitoring (ELK & Prometheus) ---
logging.level.net.logstash.logback=WARN
logging.level.org.springframework.boot.actuate=INFO

# --- Your Application Code ---
logging.level.com.foodie=DEBUG

# =========================================
# DISTRIBUTED TRACING (OpenTelemetry)
# =========================================

# Enable tracing via Micrometer
management.tracing.enabled=true

# Sample every request for development. In production, you'd use a lower value like 0.1 (10%)
management.tracing.sampling.probability=1.0

# The endpoint where the Jaeger OTLP collector is listening
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces