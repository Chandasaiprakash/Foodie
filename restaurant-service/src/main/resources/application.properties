server.port=8084

spring.application.name=restaurant-service

spring.data.mongodb.uri=mongodb://localhost:27017/foodie_restaurant
spring.data.mongodb.auto-index-creation=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true
# in application.properties
spring.elasticsearch.uris=http://localhost:9200
# Expose the Prometheus and health endpoints over HTTP
management.endpoints.web.exposure.include=prometheus,health

# Add an 'application' tag to all metrics for this service
management.metrics.tags.application=${spring.application.name}


# ===================================================================
# ? ADVANCED LOGGING CONFIGURATION (for Development)
# ===================================================================

# --- Base Log Level ---
logging.level.root=INFO

# --- Spring Framework ---
logging.level.org.springframework=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# --- Database & Search (MongoDB & Elasticsearch) ---
# Show the queries being sent to MongoDB
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
# Show interactions with Elasticsearch
logging.level.org.springframework.data.elasticsearch=TRACE

# --- Service Discovery (Eureka) ---
logging.level.com.netflix.discovery=INFO
logging.level.com.netflix.eureka=INFO

# --- Message Queue (Kafka) ---
logging.level.org.apache.kafka=WARN

# --- Monitoring (ELK & Prometheus) ---
logging.level.net.logstash.logback=WARN
logging.level.org.springframework.boot.actuate=INFO

# --- Your Application Code ---
logging.level.com.foodie=DEBUG

# =========================================
# DISTRIBUTED TRACING (OpenTelemetry)
# =========================================

# Enable tracing via Micrometer
management.tracing.enabled=true

# Sample every request for development. In production, you'd use a lower value like 0.1 (10%)
management.tracing.sampling.probability=1.0

# The endpoint where the Jaeger OTLP collector is listening
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces