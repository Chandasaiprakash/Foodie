server.port=8080

spring.application.name=gateway-service

spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

# Corrected Filter Configuration
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
# Filter 1 at index [0]
spring.cloud.gateway.routes[0].filters[0].name=StripPrefix
spring.cloud.gateway.routes[0].filters[0].args.parts=1
# Filter 2 at index [1]
spring.cloud.gateway.routes[0].filters[1].name=Retry
spring.cloud.gateway.routes[0].filters[1].args.retries=3
spring.cloud.gateway.routes[0].filters[1].args.series=SERVER_ERROR
spring.cloud.gateway.routes[0].filters[0].args.methods=GET,POST
spring.cloud.gateway.routes[0].filters[0].args.exceptions=org.springframework.cloud.gateway.support.NotFoundException

spring.cloud.gateway.routes[1].id=order-service
spring.cloud.gateway.routes[1].uri=lb://order-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/orders/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[1].filters[1]=JwtAuthentication

spring.cloud.gateway.routes[2].id=payment-service
spring.cloud.gateway.routes[2].uri=lb://payment-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/payments/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[2].filters[1]=JwtAuthentication

spring.cloud.gateway.routes[3].id=delivery-service
spring.cloud.gateway.routes[3].uri=lb://delivery-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/deliveries/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[3].filters[1]=JwtAuthentication

spring.cloud.gateway.routes[4].id=notification-service
spring.cloud.gateway.routes[4].uri=lb://notification-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[4].filters[1]=JwtAuthentication

spring.cloud.gateway.routes[5].id=restaurant-service_restaurants_route
spring.cloud.gateway.routes[5].uri=lb://restaurant-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/restaurants/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[6].id=restaurant-service_menuitems_route
spring.cloud.gateway.routes[6].uri=lb://restaurant-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/menu-items/**
spring.cloud.gateway.routes[6].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[7].id=cart-service
spring.cloud.gateway.routes[7].uri=lb://cart-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/cart/**
spring.cloud.gateway.routes[7].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[7].filters[1]=JwtAuthentication

spring.cloud.gateway.routes[8].id=notification-ws
spring.cloud.gateway.routes[8].uri=lb:ws://notification-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/ws/**
spring.cloud.gateway.routes[8].filters[0]=StripPrefix=0


eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true




# Load Balancer
spring.cloud.loadbalancer.cache.enabled=true
spring.cloud.loadbalancer.cache.ttl=30s
spring.cloud.loadbalancer.cache.capacity=1024
spring.cloud.loadbalancer.health-check.refresh-interval=25s
spring.cloud.loadbalancer.health-check.initial-delay=5s

# Gateway
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
spring.cloud.gateway.httpclient.connect-timeout=2000
spring.cloud.gateway.httpclient.response-timeout=5000

# Eureka Client
eureka.client.registry-fetch-interval-seconds=10
eureka.client.initial-instance-info-replication-interval-seconds=10
eureka.client.instance-info-replication-interval-seconds=15
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=15

# Health Checks
management.endpoint.health.show-details=when_authorized
# Expose the Prometheus and health endpoints over HTTP
management.endpoints.web.exposure.include=prometheus,health

# Add an 'application' tag to all metrics for this service
management.metrics.tags.application=${spring.application.name}
